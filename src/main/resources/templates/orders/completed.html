<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заказы в производстве</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
        <div class="d-flex align-items-center">
            <h1>Завершенные заказы</h1>
            <img th:src="@{/images/bearAxe.png}" alt="Медведь с топором" style="width: 65px; height: auto; margin-left: 15px;">
        </div>
        <a th:href="@{/orders/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Создать заказ
        </a>
    </div>

    <!-- Форма поиска -->
    <div th:replace="~{fragments/search :: searchForm}"></div>

    <div th:if="${ordersPage == null or ordersPage.empty}">Нет завершённых заказов.</div>

    <div class="row" th:unless="${ordersPage.empty}">
        <div th:each="order : ${ordersPage.content}" class="col-md-6 col-lg-4 mb-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body py-2">
                    <h5 class="card-title">
                        <a th:href="@{/orders/{id}(id=${order.id})}" th:text="${order.companyName}" class="text-decoration-none"></a>
                    </h5>
                    <p class="card-text small">
                        <strong>Продукция:</strong> <span th:text="${order.productName}"></span><br>
                        <strong>Количество:</strong> <span th:text="${order.quantity}"></span><br>
                        <strong>Стоимость:</strong> <span th:text="${#numbers.formatDecimal(order.totalCost, 0, 'COMMA', 2, 'POINT')}"></span> руб.<br>
                        <strong>Дедлайн:</strong> <span th:text="${order.deadline != null ? #temporals.format(order.deadline, 'dd.MM.yyyy') : 'не указан'}"></span><br>
                        <strong>Создан:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                    </p>
                    <div class="btn-group btn-group-sm" role="group">
                        <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="d-inline">
                            <input type="hidden" name="newStatus" value="IN_PRODUCTION">
                            <input type="hidden" name="returnTo" th:value="${currentUri}">
                            <button type="submit" class="btn btn-outline-secondary"><i class="bi bi-arrow-repeat"></i> Вернуть в производство</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <nav th:if="${ordersPage.totalPages > 1}" aria-label="Navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!ordersPage.hasPrevious()} ? 'disabled'">
                <a class="page-link" th:href="@{${currentUri}(page=${ordersPage.number - 1}, size=${ordersPage.size}, search=${param.search})}">Назад</a>
            </li>
            <li class="page-item disabled"><span class="page-link" th:text="${ordersPage.number + 1} + ' / ' + ${ordersPage.totalPages}"></span></li>
            <li class="page-item" th:classappend="${!ordersPage.hasNext()} ? 'disabled'">
                <a class="page-link" th:href="@{${currentUri}(page=${ordersPage.number + 1}, size=${ordersPage.size}, search=${param.search})}">Вперед</a>
            </li>
        </ul>
    </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
