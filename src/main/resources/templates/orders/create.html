<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Создание заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="d-flex align-items-center mb-3">
        <h1>Создание заказа</h1>
        <img th:src="@{/images/bearAxe.png}" alt="Медведь с топором" style="width: 65px; height: auto; margin-left: 15px;">
    </div>

    <form th:action="@{/orders/create}" th:object="${orderCreateDto}" method="post" class="needs-validation" novalidate>
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
            <ul>
                <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
            </ul>
        </div>
        <!-- Компания -->
        <div class="mb-3">
            <label class="form-label">Компания</label>
            <input type="text" th:field="*{companyName}"
                   class="form-control"
                   list="companyList"
                   required
                   placeholder="Введите или выберите компанию">
            <datalist id="companyList">
                <option th:each="company : ${companies}" th:value="${company.name}"></option>
            </datalist>
            <div th:if="${#fields.hasErrors('companyName')}" class="text-danger" th:errors="*{companyName}"></div>
        </div>

        <!-- Продукция -->
        <div class="mb-3">
            <label class="form-label">Продукция (муфта)</label>
            <select th:field="*{couplingId}" class="form-select" required>
                <option value="">Выберите продукцию</option>
                <option th:each="coupling : ${couplings}" th:value="${coupling.id}" th:text="${coupling.name}"></option>
            </select>
            <div th:if="${#fields.hasErrors('couplingId')}" class="text-danger" th:errors="*{couplingId}"></div>
        </div>

        <!-- Количество -->
        <div class="mb-3">
            <label class="form-label">Количество</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
            <div th:if="${#fields.hasErrors('quantity')}" class="text-danger" th:errors="*{quantity}"></div>
        </div>

        <!-- Дедлайн (необязательный) -->
        <div class="mb-3">
            <label class="form-label">Дедлайн (необязательно)</label>
            <input type="date" th:field="*{deadline}" class="form-control">
        </div>

        <!-- Дополнительные работы (через чекбоксы) -->
        <div class="mb-3">
            <label class="form-label">Дополнительные работы</label>
            <div th:each="work : ${additionalWorks}">
                <div class="form-check">
                    <input type="checkbox" th:field="*{additionalWorkIds}" th:value="${work.id}" class="form-check-input">
                    <label class="form-check-label" th:text="|${work.name} (${#numbers.formatDecimal(work.price, 0, 2)} руб.)|"></label></label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> Создать
        </button>
        <a th:href="@{/orders/waiting}" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Отмена
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
