<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактирование заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="d-flex align-items-center mb-3">
        <h1>Редактирование заказа №<span th:text="${order.id}"></span></h1>
        <img th:src="@{/images/bearAxe.png}" alt="Медведь с топором" style="width: 65px; height: auto; margin-left: 15px;">
    </div>

    <form th:action="@{/orders/{id}/edit(id=${order.id})}" th:object="${orderUpdateDto}" method="post">
        <!-- Общий блок ошибок -->
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
            <ul>
                <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
            </ul>
        </div>

        <!-- Компания -->
        <div class="mb-3">
            <label class="form-label">Компания</label>
            <input type="text" th:field="*{companyName}"
                   class="form-control"
                   list="companyList"
                   required
                   placeholder="Введите или выберите компанию">
            <datalist id="companyList">
                <option th:each="company : ${companies}" th:value="${company.name}"></option>
            </datalist>
            <div th:if="${#fields.hasErrors('companyName')}" class="text-danger" th:errors="*{companyName}"></div>
        </div>

        <!-- Тип продукции (радиокнопки) -->
        <div class="mb-3">
            <label class="form-label d-block">Тип продукции *</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="productType" id="typeCoupling" value="COUPLING"
                       th:checked="${orderUpdateDto.productType == 'COUPLING'}" required>
                <label class="form-check-label" for="typeCoupling">Муфта</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="productType" id="typeAdapter" value="ADAPTER"
                       th:checked="${orderUpdateDto.productType == 'ADAPTER'}">
                <label class="form-check-label" for="typeAdapter">Переводник</label>
            </div>
        </div>

        <!-- Блок муфты -->
        <div id="couplingBlock" style="display: none;">
            <div class="mb-3">
                <label class="form-label">Тип муфты</label>
                <select id="couplingTypeSelect" class="form-select">
                    <option value="">-- Выберите тип --</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Условный диаметр</label>
                <select id="couplingDiameterSelect" class="form-select" disabled>
                    <option value="">-- Сначала выберите тип --</option>
                </select>
            </div>
            <input type="hidden" th:field="*{couplingId}" id="couplingIdHidden" />
        </div>

        <!-- Блок переводника -->
        <div id="adapterBlock" style="display: none;">
            <div class="mb-3">
                <label class="form-label">Тип первой стороны</label>
                <select id="adapterTypeSelect" class="form-select">
                    <option value="">-- Выберите тип --</option>
                    <option th:each="type : ${adapterFirstSideTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Переводник</label>
                <select id="adapterSelect" class="form-select" disabled>
                    <option value="">-- Сначала выберите тип --</option>
                </select>
            </div>
            <input type="hidden" th:field="*{adapterId}" id="adapterIdHidden" />
        </div>

        <!-- Количество -->
        <div class="mb-3">
            <label class="form-label">Количество</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
            <div th:if="${#fields.hasErrors('quantity')}" class="text-danger" th:errors="*{quantity}"></div>
        </div>

        <!-- Дедлайн -->
        <div class="mb-3">
            <label class="form-label">Дедлайн (необязательно)</label>
            <input type="date" th:field="*{deadline}" class="form-control">
        </div>

        <!-- Дополнительные работы (через чекбоксы) -->
        <div class="mb-3">
            <label class="form-label">Дополнительные работы</label>
            <div th:each="work : ${additionalWorks}">
                <div class="form-check">
                    <input type="checkbox" th:field="*{additionalWorkIds}" th:value="${work.id}" class="form-check-input"
                           th:checked="${order.additionalWorkIds.contains(work.id)}">
                    <label class="form-check-label" th:text="|${work.name} (${#numbers.formatDecimal(work.price, 0, 2)} руб.)|"></label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> Сохранить изменения
        </button>
        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Отмена
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    // Данные из модели
    const initialProductType = /*[[${orderUpdateDto.productType}]]*/ '';
    const initialCouplingId = /*[[${orderUpdateDto.couplingId}]]*/ null;
    const initialAdapterId = /*[[${orderUpdateDto.adapterId}]]*/ null;
    const currentCouplingType = /*[[${currentCouplingType}]]*/ '';
    const currentCouplingDiameter = /*[[${currentCouplingDiameter}]]*/ '';
    const currentAdapterFirstSideType = /*[[${currentAdapterFirstSideType}]]*/ '';
    const adapterFirstSideTypes = /*[[${adapterFirstSideTypes}]]*/ [];
    /*]]>*/
</script>
<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        const radioCoupling = document.getElementById('typeCoupling');
        const radioAdapter = document.getElementById('typeAdapter');
        const couplingBlock = document.getElementById('couplingBlock');
        const adapterBlock = document.getElementById('adapterBlock');

        const couplingTypeSelect = document.getElementById('couplingTypeSelect');
        const couplingDiameterSelect = document.getElementById('couplingDiameterSelect');
        const couplingIdHidden = document.getElementById('couplingIdHidden');

        const adapterTypeSelect = document.getElementById('adapterTypeSelect');
        const adapterSelect = document.getElementById('adapterSelect');
        const adapterIdHidden = document.getElementById('adapterIdHidden');

        // Функция переключения блоков
        function toggleProductBlocks() {
            if (radioCoupling.checked) {
                couplingBlock.style.display = 'block';
                adapterBlock.style.display = 'none';
                adapterIdHidden.value = '';
            } else if (radioAdapter.checked) {
                couplingBlock.style.display = 'none';
                adapterBlock.style.display = 'block';
                couplingIdHidden.value = '';
            } else {
                couplingBlock.style.display = 'none';
                adapterBlock.style.display = 'none';
            }
        }

        radioCoupling.addEventListener('change', toggleProductBlocks);
        radioAdapter.addEventListener('change', toggleProductBlocks);
        toggleProductBlocks();

        // Загрузка типов муфт
        function loadCouplingTypes(selectedType = null) {
            return fetch('/orders/api/couplings/types')
                .then(res => res.json())
                .then(types => {
                    couplingTypeSelect.innerHTML = '<option value="">-- Выберите тип --</option>';
                    types.forEach(t => {
                        const option = new Option(t, t);
                        if (t === selectedType) option.selected = true;
                        couplingTypeSelect.add(option);
                    });
                    if (selectedType) {
                        couplingTypeSelect.dispatchEvent(new Event('change'));
                    }
                });
        }

        // При смене типа муфты загружаем диаметры
        couplingTypeSelect.addEventListener('change', function() {
            const type = this.value;
            couplingDiameterSelect.innerHTML = '<option value="">-- Выберите диаметр --</option>';
            couplingIdHidden.value = '';
            if (!type) {
                couplingDiameterSelect.disabled = true;
                return;
            }
            couplingDiameterSelect.disabled = false;
            fetch(`/orders/api/couplings/by-type?type=${encodeURIComponent(type)}`)
                .then(res => res.json())
                .then(couplings => {
                    couplings.forEach(c => {
                        const option = new Option(c.diameter, c.id);
                        couplingDiameterSelect.add(option);
                    });
                    // Если есть начальный couplingId, выбираем его
                    if (initialCouplingId) {
                        const optionToSelect = Array.from(couplingDiameterSelect.options)
                            .find(opt => opt.value == initialCouplingId);
                        if (optionToSelect) {
                            optionToSelect.selected = true;
                            couplingIdHidden.value = initialCouplingId;
                        }
                    }
                });
        });

        couplingDiameterSelect.addEventListener('change', function() {
            couplingIdHidden.value = this.value;
        });

        // Для переводников
        function loadAdaptersByFirstSideType(type, selectedAdapterId = null) {
            if (!type) return;
            return fetch(`/orders/api/adapters/by-first-side-type?type=${encodeURIComponent(type)}`)
                .then(res => res.json())
                .then(adapters => {
                    adapterSelect.innerHTML = '<option value="">-- Выберите переводник --</option>';
                    adapters.forEach(a => {
                        const option = new Option(a.fullName, a.id);
                        if (a.id == selectedAdapterId) option.selected = true;
                        adapterSelect.add(option);
                    });
                    if (selectedAdapterId) {
                        adapterIdHidden.value = selectedAdapterId;
                    }
                });
        }

        adapterTypeSelect.addEventListener('change', function() {
            const type = this.value;
            adapterSelect.innerHTML = '<option value="">-- Сначала выберите тип --</option>';
            adapterIdHidden.value = '';
            if (!type) {
                adapterSelect.disabled = true;
                return;
            }
            adapterSelect.disabled = false;
            loadAdaptersByFirstSideType(type);
        });

        adapterSelect.addEventListener('change', function() {
            adapterIdHidden.value = this.value;
        });

        // Инициализация в зависимости от начального типа продукта
        if (initialProductType === 'COUPLING') {
            radioCoupling.checked = true;
            toggleProductBlocks();
            // Загружаем типы муфт с выбором нужного типа
            loadCouplingTypes(currentCouplingType).then(() => {
                // После загрузки типов и вызова change, сработает загрузка диаметров,
                // в которой мы выберем нужный couplingId (initialCouplingId)
            });
        } else if (initialProductType === 'ADAPTER') {
            radioAdapter.checked = true;
            toggleProductBlocks();
            // Выбираем тип первой стороны
            adapterTypeSelect.value = currentAdapterFirstSideType;
            // Загружаем переводники и выбираем нужный
            loadAdaptersByFirstSideType(currentAdapterFirstSideType, initialAdapterId);
        }
    });
    /*]]>*/
</script>
</body>
</html>
