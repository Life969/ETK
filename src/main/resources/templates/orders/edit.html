<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактирование заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="d-flex align-items-center mb-3">
        <h1>Редактирование заказа №<span th:text="${order.id}"></span></h1>
        <img th:src="@{/images/bearAxe.png}" alt="Медведь с топором" style="width: 65px; height: auto; margin-left: 15px;">
    </div>

    <form th:action="@{/orders/{id}/edit(id=${order.id})}" th:object="${orderUpdateDto}" method="post">
        <!-- Общий блок ошибок -->
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
            <ul>
                <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
            </ul>
        </div>

        <!-- Компания -->
        <div class="mb-3">
            <label class="form-label">Компания</label>
            <input type="text" th:field="*{companyName}"
                   class="form-control"
                   list="companyList"
                   required
                   placeholder="Введите или выберите компанию">
            <datalist id="companyList">
                <option th:each="company : ${companies}" th:value="${company.name}"></option>
            </datalist>
            <div th:if="${#fields.hasErrors('companyName')}" class="text-danger" th:errors="*{companyName}"></div>
        </div>

        <!-- Продукция -->
        <div class="mb-3">
            <label class="form-label">Тип муфты</label>
            <select id="typeSelect" class="form-select" required>
                <option value="">-- Выберите тип --</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Условный диаметр</label>
            <select id="diameterSelect" class="form-select" required disabled>
                <option value="">-- Сначала выберите тип --</option>
            </select>
            <div th:if="${#fields.hasErrors('couplingId')}" class="text-danger" th:errors="*{couplingId}"></div>
        </div>

        <input type="hidden" th:field="*{couplingId}" id="couplingIdHidden" />

        <!-- Количество -->
        <div class="mb-3">
            <label class="form-label">Количество</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
            <div th:if="${#fields.hasErrors('quantity')}" class="text-danger" th:errors="*{quantity}"></div>
        </div>

        <!-- Дедлайн -->
        <div class="mb-3">
            <label class="form-label">Дедлайн (необязательно)</label>
            <input type="date" th:field="*{deadline}" class="form-control">
        </div>

        <!-- Дополнительные работы (через чекбоксы) -->
        <div class="mb-3">
            <label class="form-label">Дополнительные работы</label>
            <div th:each="work : ${additionalWorks}">
                <div class="form-check">
                    <input type="checkbox" th:field="*{additionalWorkIds}" th:value="${work.id}" class="form-check-input"
                           th:checked="${order.additionalWorkIds.contains(work.id)}">
                    <label class="form-check-label" th:text="|${work.name} (${#numbers.formatDecimal(work.price, 0, 2)} руб.)|"></label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> Сохранить изменения
        </button>
        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Отмена
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        const typeSelect = document.getElementById('typeSelect');
        const diameterSelect = document.getElementById('diameterSelect');
        const couplingIdHidden = document.getElementById('couplingIdHidden');

        // Получаем текущие значения из атрибутов модели
        const currentType = /*[[${currentCouplingType}]]*/ '';
        const currentDiameter = /*[[${currentCouplingDiameter}]]*/ '';
        const currentCouplingId = /*[[${currentCouplingId}]]*/ null;

        // Загружаем типы
        fetch('/orders/api/couplings/types')
            .then(response => response.json())
            .then(types => {
                types.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    typeSelect.appendChild(option);
                });
                // После загрузки типов – устанавливаем текущий тип
                if (currentType) {
                    typeSelect.value = currentType;
                    // Триггерим событие change, чтобы загрузить диаметры
                    typeSelect.dispatchEvent(new Event('change'));
                }
            });

        // Обработчик смены типа
        typeSelect.addEventListener('change', function() {
            const selectedType = this.value;
            diameterSelect.innerHTML = '<option value="">-- Выберите диаметр --</option>';
            couplingIdHidden.value = '';
            if (!selectedType) {
                diameterSelect.disabled = true;
                return;
            }
            diameterSelect.disabled = false;
            fetch(`/orders/api/couplings/by-type?type=${encodeURIComponent(selectedType)}`)
                .then(response => response.json())
                .then(couplings => {
                    couplings.forEach(c => {
                        const option = document.createElement('option');
                        option.value = c.id;
                        option.textContent = c.diameter;
                        diameterSelect.appendChild(option);
                    });
                    // После загрузки диаметров – устанавливаем текущий диаметр и couplingId
                    if (currentCouplingId && currentDiameter) {
                        // Ищем опцию с id = currentCouplingId
                        for (let i = 0; i < diameterSelect.options.length; i++) {
                            if (diameterSelect.options[i].value == currentCouplingId) {
                                diameterSelect.value = currentCouplingId;
                                couplingIdHidden.value = currentCouplingId;
                                break;
                            }
                        }
                    }
                });
        });

        // При ручном выборе диаметра обновляем скрытое поле
        diameterSelect.addEventListener('change', function() {
            couplingIdHidden.value = this.value;
        });
    });
    /*]]>*/
</script>
</body>
</html>
