<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Детали заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="d-flex align-items-center mb-3">
        <h1>Заказ №<span th:text="${order.id}"></span></h1>
        <img th:src="@{/images/bearAxe.png}" alt="Медведь с топором" style="width: 65px; height: auto; margin-left: 15px;">
    </div>

    <div class="card">
        <div class="card-body">
            <p><strong>Дата формирования:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></span></p>
            <p><strong>Компания:</strong> <span th:text="${order.companyName}"></span></p>
            <p><strong>Продукция:</strong> <span th:text="${order.productName}"></span></p>
            <p><strong>Количество:</strong> <span th:text="${order.quantity}"></span></p>
            <p><strong>Дедлайн:</strong> <span th:text="${order.deadline != null ? #temporals.format(order.deadline, 'dd.MM.yyyy') : 'не указан'}"></span></p>
            <p><strong>Дополнительные работы:</strong></p>
            <ul th:if="${not order.additionalWorkNames.empty}">
                <li th:each="work : ${order.additionalWorkNames}" th:text="${work}"></li>
            </ul>
            <p th:if="${order.additionalWorkNames.empty}">Нет</p>
            <p><strong>Общая стоимость:</strong> <span th:text="${#numbers.formatDecimal(order.totalCost, 0, 'COMMA', 2, 'POINT')}"></span> руб.</p>
            <p><strong>Статус:</strong>
                <span th:switch="${order.status}">
                    <span th:case="'WAITING'">Ожидает подписания</span>
                    <span th:case="'IN_PRODUCTION'">В производстве</span>
                    <span th:case="'COMPLETED'">Выполнен</span>
                </span>
            </p>
        </div>
    </div>

    <a th:href="@{/orders/waiting}" class="btn btn-secondary mt-3">
        <i class="bi bi-arrow-left"></i> Назад
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
