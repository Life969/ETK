<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${status == 'WAITING'} ? 'Заказы в ожидании' :
                  ${status == 'IN_PRODUCTION'} ? 'Заказы в производстве' : 'Выполненные заказы'"></h1>

    <a th:href="@{/orders/create}" class="btn btn-primary mb-3">Создать заказ</a>

    <div th:if="${orders.isEmpty()}" class="alert alert-info">Нет заказов</div>

    <div class="row">
        <div th:each="order : ${orders}" class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">
                        <a th:href="@{/orders/{id}(id=${order.id})}" th:text="${order.companyName}"></a>
                    </h5>
                    <p class="card-text">
                        <strong>Продукция:</strong> <span th:text="${order.productName}"></span><br>
                        <strong>Количество:</strong> <span th:text="${order.quantity}"></span><br>
                        <strong>Стоимость:</strong> <span th:text="${#numbers.formatDecimal(order.totalCost, 0, 'COMMA', 2, 'POINT')}"></span> руб.<br>
                        <strong>Дедлайн:</strong> <span th:text="${order.deadline != null ? #temporals.format(order.deadline, 'dd.MM.yyyy') : 'не указан'}"></span>
                    </p>

                    <!-- Кнопки изменения статуса -->
                    <div th:if="${order.status.name() == 'WAITING'}">
                        <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="d-inline">
                            <input type="hidden" name="newStatus" value="IN_PRODUCTION">
                            <input type="hidden" name="returnTo" th:value="${#request.requestURI}">
                            <button type="submit" class="btn btn-sm btn-success">В производство</button>
                        </form>
                    </div>
                    <div th:if="${order.status.name() == 'IN_PRODUCTION'}">
                        <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="d-inline">
                            <input type="hidden" name="newStatus" value="COMPLETED">
                            <input type="hidden" name="returnTo" th:value="${#request.requestURI}">
                            <button type="submit" class="btn btn-sm btn-primary">Завершить</button>
                        </form>
                        <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="d-inline">
                            <input type="hidden" name="newStatus" value="WAITING">
                            <input type="hidden" name="returnTo" th:value="${#request.requestURI}">
                            <button type="submit" class="btn btn-sm btn-warning">Вернуть в ожидание</button>
                        </form>
                    </div>
                    <div th:if="${order.status.name() == 'COMPLETED'}">
                        <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="d-inline">
                            <input type="hidden" name="newStatus" value="IN_PRODUCTION">
                            <input type="hidden" name="returnTo" th:value="${#request.requestURI}">
                            <button type="submit" class="btn btn-sm btn-secondary">Вернуть в производство</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
