<!DOCTYPE html>

<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Дополнительные работы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center">   <!-- этот див соберет заголовок и медведя в ряд -->
            <h1>Дополнительные работы</h1>
            <img th:src="@{/images/iceBear.png}" alt="Медведь с топором"
                 style="width: 65px; height: auto; margin-left: 15px;">
        </div>
        <a href="/" class="btn btn-primary">
            <i class="bi bi-house-door"></i> На главную
        </a>
    </div>
    <div th:if="${message}" th:class="'alert alert-' + ${messageType}" role="alert">
        <span th:text="${message}">Сообщение</span>
    </div>

    <!-- Проверяем, пуст ли список -->
    <div th:if="${works.isEmpty()}" class="alert alert-info" role="alert">
        <p>Список дополнительных работ пуст.</p>
    </div>

    <!-- Если список не пуст, отображаем таблицу -->
    <table class="table table-striped table-hover" th:unless="${works.isEmpty()}">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Название работ</th>
            <th>Цена</th>
            <th>Комментарий</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>

        <tr th:each="work : ${works}">
            <td th:text="${work.id}">1</td>
            <td th:text="${work.name}">Фосфатирование</td>
            <td th:text="${work.price}">200</td>
            <td th:text="${work.description}">Тут описание</td>
            <td>
                <a th:href="@{/additionalWork/edit/{id}(id=${work.id})}" class="btn btn-sm btn-primary">
                    <i class="bi bi-pencil"></i> Редактировать</a>
                <form th:action="@{/additionalWork/delete/{id}(id=${work.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Точно удалить?')">
                        <i class="bi bi-trash"></i> Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <!-- Кнопка для добавления нового сотрудника -->
    <a href="/additionalWork/new" class="btn btn-success">Добавить работу</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
