<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Дополнительная работа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <!-- Заголовок в зависимости от того, новая запись или редактирование -->
    <h1 th:if="${work.id == null}">Новая дополнительная работа</h1>
    <h1 th:unless="${work.id == null}">Редактирование дополнительной работы</h1>

    <form action="#" th:action="@{/additionalWork/save}" th:object="${work}" method="post" class="mt-3">
        <!-- Скрытое поле для id (заполняется только при редактировании) -->
        <input type="hidden" th:field="*{id}" />

        <!-- Поле Наименование работы -->
        <div class="mb-3">
            <label for="name" class="form-label">Наименование работы <span class="text-danger">*</span></label>
            <input type="text" id="name" th:field="*{name}" class="form-control"
                   :class="{'is-invalid': #fields.hasErrors('name')}" />
            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback"></div>
            <small class="form-text text-muted">Обязательное поле</small>
        </div>

        <!-- Поле Стоимость -->
        <div class="mb-3">
            <label for="price" class="form-label">Стоимость (₽) <span class="text-danger">*</span></label>
            <input type="number" id="price" th:field="*{price}" class="form-control" step="0.01" min="0.01"
                   :class="{'is-invalid': #fields.hasErrors('price')}" />
            <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="invalid-feedback"></div>
            <small class="form-text text-muted">Цена должна быть больше 0</small>
        </div>

        <!-- Поле Описание (необязательное) -->
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea id="description" th:field="*{description}" rows="3" class="form-control"
                      :class="{'is-invalid': #fields.hasErrors('description')}"></textarea>
            <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="invalid-feedback"></div>
            <small class="form-text text-muted">Необязательное поле</small>
        </div>

        <!-- Кнопки -->
        <button type="submit" class="btn btn-success">
            <i class="bi bi-check-lg"></i> Сохранить
        </button>
        <a href="/additionalWork" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Отмена
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
