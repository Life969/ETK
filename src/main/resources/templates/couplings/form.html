<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Муфта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <h1 th:if="${coupling.id == null}">Новая муфта</h1>
    <h1 th:unless="${coupling.id == null}">Редактирование муфты</h1>

    <form action="#" th:action="@{/couplings/save}" th:object="${coupling}" method="post">
        <!-- Скрытое поле для id (при редактировании) -->
        <input type="hidden" th:field="*{id}" />

        <!-- Тип муфты (обязательное) -->
        <div class="mb-3">
            <label for="type" class="form-label">Тип муфты:<span class="text-danger">*</span></label>
            <input type="text" id="type" th:field="*{type}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Условный диаметр (обязательное) -->
        <div class="mb-3">
            <label for="conditionalDiameter" class="form-label">Условный диаметр:<span class="text-danger">*</span></label>
            <input type="text" id="conditionalDiameter" th:field="*{conditionalDiameter}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Длина (обязательное) -->
        <div class="mb-3">
            <label for="lengthMm" class="form-label">Длина (мм):<span class="text-danger">*</span></label>
            <input type="number" step="0.1" id="lengthMm" th:field="*{lengthMm}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Вес (обязательное) -->
        <div class="mb-3">
            <label for="weightKg" class="form-label">Вес (кг):<span class="text-danger">*</span></label>
            <input type="number" step="0.01" id="weightKg" th:field="*{weightKg}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Внешний диаметр (обязательное) -->
        <div class="mb-3">
            <label for="outerDiameterMm" class="form-label">Внешний диаметр (мм):<span class="text-danger">*</span></label>
            <input type="number" step="0.1" id="outerDiameterMm" th:field="*{outerDiameterMm}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Внутренний диаметр (обязательное) -->
        <div class="mb-3">
            <label for="innerDiameterMm" class="form-label">Внутренний диаметр (мм):<span class="text-danger">*</span></label>
            <input type="number" step="0.1" id="innerDiameterMm" th:field="*{innerDiameterMm}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Цена изготовления (обязательное) -->
        <div class="mb-3">
            <label for="manufacturingCost" class="form-label">Цена изготовления (руб):<span class="text-danger">*</span></label>
            <input type="number" step="0.01" id="manufacturingCost" th:field="*{manufacturingCost}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>
        <!-- Цена изготовления для работника (обязательное) -->
        <div class="mb-3">
            <label for="price_for_employee" class="form-label">Цена изготовления для работника (руб):<span class="text-danger">*</span></label>
            <input type="number" step="0.01" id="price_for_employee" th:field="*{priceForEmployee}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Фото (необязательное) -->
        <div class="mb-3">
            <label for="imageFileInput" class="form-label">Фото муфты (jpg, png, gif):</label>
            <input type="file" id="imageFileInput" class="form-control" accept="image/jpeg,image/png,image/gif" />
            <small class="form-text text-muted">Поддерживаются изображения до 5 МБ.</small>

            <!-- Скрытое поле, в которое JS положит base64 -->
            <input type="hidden" id="imageBase64" name="imageBase64" />

            <!-- Превью текущего фото (если есть) -->
            <div th:if="${coupling.imagePath != null and !coupling.imagePath.isEmpty()}">
                <div class="image-container">
                    <img th:src="@{${coupling.imagePath}}" alt="Текущее фото" style="max-width: 200px;">
                </div>
                <p class="text-muted mt-1">Текущее фото. Загрузите новое, чтобы заменить.</p>
            </div>
        </div>

        <!-- ГОСТ (необязательное) -->
        <div class="mb-3">
            <label for="standart" class="form-label">ГОСТ:</label>
            <input type="text" id="standart" th:field="*{standart}" class="form-control" placeholder="Необязательно" />
        </div>

        <!-- Описание (необязательное) -->
        <div class="mb-3">
            <label for="description" class="form-label">Описание:</label>
            <textarea id="description" th:field="*{description}" class="form-control" rows="3" placeholder="Необязательно"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Сохранить</button>
        <a th:href="@{/couplings}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('imageFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Проверка размера (5 МБ)
        if (file.size > 5 * 1024 * 1024) {
            alert('Файл слишком большой. Максимальный размер 5 МБ.');
            e.target.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function(ev) {
            // Сохраняем base64 в скрытое поле
            document.getElementById('imageBase64').value = ev.target.result;
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
