<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Муфта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <h1 th:if="${coupling.id == null}">Новая муфта</h1>
    <h1 th:unless="${coupling.id == null}">Редактирование муфты</h1>

    <form action="#" th:action="@{/couplings/save}" th:object="${coupling}" method="post"  class="mt-3">
        <!-- Скрытое поле для id (при редактировании) -->
        <input type="hidden" th:field="*{id}" />

        <!-- Тип муфты (обязательное) -->
        <div class="mb-3">
            <label for="type" class="form-label">Тип муфты:</label>
            <input type="text" id="type" th:field="*{type}" class="form-control" required />
        </div>

        <!-- Условный диаметр (обязательное) -->
        <div class="mb-3">
            <label for="conditionalDiameter" class="form-label">Условный диаметр:</label>
            <input type="text" id="conditionalDiameter" th:field="*{conditionalDiameter}" class="form-control" required />
        </div>

        <!-- Длина (обязательное) -->
        <div class="mb-3">
            <label for="lengthMm" class="form-label">Длина (мм):</label>
            <input type="number" step="0.1" id="lengthMm" th:field="*{lengthMm}" class="form-control" required />
        </div>

        <!-- Вес (обязательное) -->
        <div class="mb-3">
            <label for="weightKg" class="form-label">Вес (кг):</label>
            <input type="number" step="0.01" id="weightKg" th:field="*{weightKg}" class="form-control" required />
        </div>

        <!-- Внешний диаметр (обязательное) -->
        <div class="mb-3">
            <label for="outerDiameterMm" class="form-label">Внешний диаметр (мм):</label>
            <input type="number" step="0.1" id="outerDiameterMm" th:field="*{outerDiameterMm}" class="form-control" required />
        </div>

        <!-- Внутренний диаметр (обязательное) -->
        <div class="mb-3">
            <label for="innerDiameterMm" class="form-label">Внутренний диаметр (мм):</label>
            <input type="number" step="0.1" id="innerDiameterMm" th:field="*{innerDiameterMm}" class="form-control" required />
        </div>

        <!-- Цена изготовления (обязательное) -->
        <div class="mb-3">
            <label for="manufacturingCost" class="form-label">Цена изготовления (руб):</label>
            <input type="number" step="0.01" id="manufacturingCost" th:field="*{manufacturingCost}" class="form-control" required />
        </div>

        <!-- Фото (необязательное) -->
        <div class="mb-3">
            <label for="imagePath" class="form-label">Фото (путь к файлу):</label>
            <input type="text" id="imagePath" th:field="*{imagePath}" class="form-control" placeholder="Необязательно" />
        </div>

        <!-- ГОСТ (необязательное) -->
        <div class="mb-3">
            <label for="standart" class="form-label">ГОСТ:</label>
            <input type="text" id="standart" th:field="*{standart}" class="form-control" placeholder="Необязательно" />
        </div>

        <!-- Описание (необязательное) -->
        <div class="mb-3">
            <label for="description" class="form-label">Описание:</label>
            <textarea id="description" th:field="*{description}" class="form-control" rows="3" placeholder="Необязательно"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Сохранить</button>
        <a th:href="@{/couplings}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
