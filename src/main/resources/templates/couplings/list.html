<!DOCTYPE html>
<!-- Обязательно подключаем пространство имен Thymeleaf -->
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Справочник муфт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center">   <!-- этот див соберет заголовок и медведя в ряд -->
            <h1>Справочник муфт</h1>
            <img th:src="@{/images/bearAxe.png}" alt="Медведь с топором"
                 style="width: 65px; height: auto; margin-left: 15px;">
        </div>
        <a href="/" class="btn btn-primary">
            <i class="bi bi-house-door"></i> На главную
        </a>
    </div>
    <div th:if="${message}" th:class="'alert alert-' + ${messageType}" role="alert">
        <span th:text="${message}">Сообщение</span>
    </div>

    <!-- Проверяем, пуст ли список -->
    <div th:if="${groupedCouplings.isEmpty()}" class="alert alert-info" role="alert">
        <p>Список муфт пуст.</p>
    </div>

    <!-- Если список не пуст, отображаем таблицу -->
    <div th:each="entry : ${groupedCouplings}">
        <h2 th:text="${entry.key}" class="mt-4">НКТ</h2>
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Обозначение</th>
                <th>Длина (мм)</th>
                <th>Вес (кг)</th>
                <th>Наруж. диаметр (мм)</th>
                <th>Внутр. диаметр (мм)</th>
                <th>Цена изготовления(руб)</th>
                <th>Цена для работника(руб)</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="coupling : ${entry.value}">
                <!-- Делаем первую ячейку ссылкой на карточку -->
                <td>
                    <a th:href="@{/couplings/{id}(id=${coupling.id})}"
                       th:text="${coupling.name}">НКТ 73</a>
                </td>
                <td th:text="${coupling.lengthMm}">134</td>
                <td th:text="${coupling.weightKg}">2.5</td>
                <td th:text="${coupling.outerDiameterMm}">89.9</td>
                <td th:text="${coupling.innerDiameterMm}">69.8</td>
                <td th:text="${coupling.manufacturingCost}">1200</td>
                <td th:text="${coupling.priceForEmployee}">120</td>
                <td>
                    <!-- Можно добавить кнопки редактирования/удаления только для админа, но пока не обязательно -->
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <!-- Кнопка для добавления нового сотрудника -->
    <a href="/couplings/new" class="btn btn-success">Добавить муфту</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
