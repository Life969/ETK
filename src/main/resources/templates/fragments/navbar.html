<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Этот head не будет использоваться при вставке, но должен быть для валидности HTML -->
</head>
<body>
<!-- Определяем фрагмент с именем "navbar" -->
<div th:fragment="navbar" class="mb-4">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1e2b38;">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-cup-straw"></i> Завод
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- Определяем активность по текущему URI -->
                    <li class="nav-item">
                        <a class="nav-link"
                           th:classappend="${currentUri == '/' or currentUri == '/home'} ? 'active' : ''"
                           href="/">Главная</a>
                    </li>
                    <li class="nav-item dropdown" th:classappend="${currentUri.startsWith('/couplings') or currentUri.startsWith('/employees') or currentUri.startsWith('/machines')} ? 'active' : ''">
                        <a class="nav-link dropdown-toggle" href="#" id="referencesDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-database"></i> Справочники
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="referencesDropdown">
                            <li><a class="dropdown-item" href="/couplings">Муфты</a></li>
                            <li><a class="dropdown-item" href="/employees">Сотрудники</a></li>
                            <li><a class="dropdown-item" href="/machines">Станки</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           th:classappend="${currentUri.startsWith('/production-records')} ? 'active' : ''"
                           href="/production-records">Журнал Производства</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           th:classappend="${currentUri.startsWith('/reports')} ? 'active' : ''"
                           href="/reports/employee">Отчёты</a>
                    </li>
                    <!-- Здесь можно добавить другие пункты меню -->
                </ul>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
