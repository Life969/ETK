<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Коммерческое предложение</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="d-flex justify-content-between align-items-center flex-wrap">
        <h1>Коммерческое предложение</h1>
        <div>
            <form th:action="@{/commercial-offer/clear}" method="post" class="d-inline">
                <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Сбросить КП</button>
            </form>
            <button id="pdfBtn" class="btn btn-primary ms-2" disabled><i class="bi bi-file-pdf"></i> Сформировать PDF
                (скоро)
            </button>
        </div>
    </div>
    <hr>

    <h3 th:text="'Компания: ' + ${companyName}"></h3>

    <div class="table-responsive">
        <table class="table table-bordered mt-3 align-middle">
            <thead class="table-light">
            <tr>
                <th>Наименование продукции</th>
                <th class="text-center">Количество</th>
                <th class="text-end">Цена за ед., руб.</th>
                <th class="text-end">Общая стоимость, руб.</th>
                <th class="text-center">Действие</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td>
        <span th:if="${order.productType == 'COUPLING'}">
            <i class="bi bi-box-seam"></i> Муфта:
        </span>
                    <span th:if="${order.productType == 'ADAPTER'}">
            <i class="bi bi-arrow-left-right"></i> Переводник:
        </span>
                    <span th:text="${order.productName}">Название</span>
                </td>
                <td class="text-center" th:text="${order.quantity}"></td>
                <td class="text-end">
        <span th:if="${order.quantity != null and order.quantity > 0 and order.totalCost != null}"
              th:text="${#numbers.formatDecimal(order.totalCost / order.quantity, 0, 'COMMA', 2, 'POINT')}"></span>
                    <span th:unless="${order.quantity != null and order.quantity > 0 and order.totalCost != null}">—</span>
                </td>
                <td class="text-end">
                    <span th:if="${order.totalCost != null}"
                          th:text="${#numbers.formatDecimal(order.totalCost, 0, 'COMMA', 2, 'POINT')}"></span>
                    <span th:unless="${order.totalCost != null}">—</span>
                </td>
                <td class="text-center">
                    <form th:action="@{/commercial-offer/remove/{id}(id=${order.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-x-lg"></i> <span class="d-none d-sm-inline">Удалить</span>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
            <tfoot>
            <tr class="table-secondary">
                <th colspan="3" class="text-end">Итого:</th>
                <th class="text-end" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 2, 'POINT')}"></th>
                <th></th>
            </tr>
            </tfoot>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
