<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Отчёт по сотруднику</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1>Отчёт по сотруднику</h1>

    <!-- Форма выбора сотрудника и периода -->
    <form method="get" class="row g-3 mb-4">
        <div class="col-md-4">
            <label for="employeeId" class="form-label">Сотрудник</label>
            <select name="employeeId" id="employeeId" class="form-select" required>
                <option value="">Выберите сотрудника</option>
                <option th:each="emp : ${employees}"
                        th:value="${emp.id}"
                        th:text="${emp.name}"
                        th:selected="${selectedEmployee != null and emp.id == selectedEmployee.id}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="startDate" class="form-label">Период с</label>
            <input type="date" name="startDate" id="startDate" class="form-control"
                   th:value="${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}" />
        </div>
        <div class="col-md-2">
            <label for="endDate" class="form-label">по</label>
            <input type="date" name="endDate" id="endDate" class="form-control"
                   th:value="${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}" />
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">Сформировать</button>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <a href="/reports/employee" class="btn btn-secondary w-100">Сбросить</a>
        </div>
    </form>

    <!-- Отображение отчёта, если сотрудник выбран -->
    <div th:if="${selectedEmployee != null}">
        <div class="card mb-4">
            <div class="card-header">
                <strong>Отчёт за период:</strong> с <span th:text="${#temporals.format(startDate, 'dd.MM.yyyy')}"></span>
                по <span th:text="${#temporals.format(endDate, 'dd.MM.yyyy')}"></span>
                <br><strong>Сотрудник:</strong> <span th:text="${selectedEmployee.name}"></span>
            </div>
            <div class="card-body">
                <div th:if="${records.isEmpty()}" class="alert alert-info">
                    За указанный период нет записей.
                </div>
                <div th:unless="${records.isEmpty()}">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>Дата изготовления</th>
                            <th>Муфта</th>
                            <th>Станок</th>
                            <th>Количество</th>
                            <th>Цена за шт., руб.</th>
                            <th>Сумма, руб.</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="rec : ${records}">
                            <td th:text="${#temporals.format(rec.productionDate, 'dd.MM.yyyy')}"></td>
                            <td th:text="${rec.coupling.name}"></td>
                            <td th:text="${rec.machine.name}"></td>
                            <td th:text="${rec.quantity}"></td>
                            <td th:text="${#numbers.formatDecimal(rec.coupling.priceForEmployee, 0, 2)}"></td>
                            <td th:text="${#numbers.formatDecimal(rec.coupling.priceForEmployee * rec.quantity, 0, 2)}"></td>
                        </tr>
                        </tbody>
                        <tfoot class="table-group-divider">
                        <tr>
                            <td colspan="5" class="text-end fw-bold">Итого:</td>
                            <td class="fw-bold" th:text="${#numbers.formatDecimal(totalEarned, 0, 2)}"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
