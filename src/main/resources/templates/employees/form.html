<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Сотрудник</title>
</head>
<body>
<h1 th:if="${employee.id == null}">Новый сотрудник</h1>
<h1 th:unless="${employee.id == null}">Редактирование сотрудника</h1>

<!-- Форма будет отправлять POST на /ui/employees/save -->
<form action="#" th:action="@{/employees/save}" th:object="${employee}" method="post">
    <!-- Скрытое поле для id (при редактировании) -->
    <input type="hidden" th:field="*{id}" />

    <div>
        <label for="name">Имя:</label>
        <input type="text" id="name" th:field="*{name}" required />
    </div>

    <div style="margin-top: 10px;">
        <button type="submit">Сохранить</button>
        <a href="/employees">Отмена</a>
    </div>
</form>
</body>
</html>
