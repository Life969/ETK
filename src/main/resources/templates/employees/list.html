<!DOCTYPE html>
<!-- Обязательно подключаем пространство имен Thymeleaf -->
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Список сотрудников</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container mt-4">
<h1>Сотрудники</h1>


<!-- Проверяем, пуст ли список -->
<div th:if="${employees.isEmpty()}" class="alert alert-info" role="alert">
    <p>Список сотрудников пуст.</p>
</div>

<!-- Если список не пуст, отображаем таблицу -->
<table class="table table-striped table-hover" th:unless="${employees.isEmpty()}">
    <thead class="table-light">
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <!-- th:each - это цикл по списку employees.
         Каждый элемент списка становится переменной 'emp' -->
    <tr th:each="emp : ${employees}">
        <td th:text="${emp.id}">2</td>
        <td th:text="${emp.name}">Иван Иванов</td>
        <td>
            <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="btn btn-sm btn-warning">Редактировать</a>
            <form th:action="@{/employees/delete/{id}(id=${emp.id})}" method="post" style="display:inline;">
                <button type="submit" class ="btn btn-sm btn-danger" onclick="return confirm('Точно удалить?')">Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<!-- Кнопка для добавления нового сотрудника -->
<a href="/employees/new" class="btn btn-success">Добавить сотрудника</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
