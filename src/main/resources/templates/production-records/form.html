<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Журнал производства</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1 th:if="${record.id == null}">Новая запись</h1>
    <h1 th:unless="${record.id == null}">Редактирование записи</h1>

    <form action="#" th:action="@{/production-records/save}" th:object="${record}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}" />

        <!-- Дата изготовления -->
        <div class="mb-3">
            <label for="productionDate" class="form-label">Дата изготовления *</label>
            <input type="date" id="productionDate" th:field="*{productionDate}" class="form-control" required />
        </div>

        <!-- Продукция (выбор из справочника муфт) -->
        <div class="mb-3">
            <label for="coupling" class="form-label">Продукция *</label>
            <select id="coupling" th:field="*{coupling.id}" class="form-select" required>
                <option value="">Выберите муфту</option>
                <option th:each="c : ${couplings}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>

        <!-- Количество -->
        <div class="mb-3">
            <label for="quantity" class="form-label">Количество *</label>
            <input type="number" id="quantity" th:field="*{quantity}" class="form-control" min="1" required />
        </div>

        <!-- Сотрудник -->
        <div class="mb-3">
            <label for="employee" class="form-label">Сотрудник *</label>
            <select id="employee" th:field="*{employee.id}" class="form-select" required>
                <option value="">Выберите сотрудника</option>
                <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.name}"></option>
            </select>
        </div>

        <!-- Станок -->
        <div class="mb-3">
            <label for="machine" class="form-label">Станок *</label>
            <select id="machine" th:field="*{machine.id}" class="form-select" required>
                <option value="">Выберите станок</option>
                <option th:each="m : ${machines}" th:value="${m.id}" th:text="${m.name}"></option>
            </select>
        </div>

        <!-- Комментарий -->
        <div class="mb-3">
            <label for="comment" class="form-label">Комментарий</label>
            <textarea id="comment" th:field="*{comment}" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Сохранить</button>
        <a th:href="@{/production-records}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
