<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Журнал производства</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1 th:if="${record.id == null}">Новая запись</h1>
    <h1 th:unless="${record.id == null}">Редактирование записи</h1>

    <form action="#" th:action="@{/production-records/save}" th:object="${record}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}" />

        <!-- Дата изготовления -->
        <div class="mb-3">
            <label for="productionDate" class="form-label">Дата изготовления <span class="text-danger">*</span></label>
            <input type="date" id="productionDate" th:field="*{productionDate}" class="form-control" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Продукция (выбор из справочника муфт) -->
        <div class="mb-3">
            <label class="form-label">Тип муфты<span class="text-danger">*</span></label>
            <select id="typeSelect" class="form-select" required>
                <option value="">-- Выберите тип --</option>
            </select>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <div class="mb-3">
            <label class="form-label">Условный диаметр<span class="text-danger">*</span></label>
            <select id="diameterSelect" class="form-select" required disabled>
                <option value="">-- Сначала выберите тип --</option>
            </select>
            <div th:if="${#fields.hasErrors('coupling.id')}" class="text-danger" th:errors="*{coupling.id}"></div>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Скрытое поле, в которое будет записываться реальный coupling.id -->
        <input type="hidden" th:field="*{coupling.id}" id="couplingIdHidden" />

        <!-- Количество -->
        <div class="mb-3">
            <label for="quantity" class="form-label">Количество <span class="text-danger">*</span></label>
            <input type="number" id="quantity" th:field="*{quantity}" class="form-control" min="1" required />
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Сотрудник -->
        <div class="mb-3">
            <label for="employee" class="form-label">Сотрудник <span class="text-danger">*</span></label>
            <select id="employee" th:field="*{employee.id}" class="form-select" required>
                <option value="">Выберите сотрудника</option>
                <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.name}"></option>
            </select>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Станок -->
        <div class="mb-3">
            <label for="machine" class="form-label">Станок <span class="text-danger">*</span></label>
            <select id="machine" th:field="*{machine.id}" class="form-select" required>
                <option value="">Выберите станок</option>
                <option th:each="m : ${machines}" th:value="${m.id}" th:text="${m.name}"></option>
            </select>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Комментарий -->
        <div class="mb-3">
            <label for="comment" class="form-label">Комментарий</label>
            <textarea id="comment" th:field="*{comment}" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Сохранить</button>
        <a th:href="@{/production-records}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        const typeSelect = document.getElementById('typeSelect');
        const diameterSelect = document.getElementById('diameterSelect');
        const couplingIdHidden = document.getElementById('couplingIdHidden');

        // Получаем текущие значения (если редактируем)
        // Передаём из контроллера: currentCouplingType, currentCouplingDiameter, currentCouplingId
        const currentType = /*[[${currentCouplingType}]]*/ '';
        const currentDiameter = /*[[${currentCouplingDiameter}]]*/ '';
        const currentCouplingId = /*[[${currentCouplingId}]]*/ null;

        // Загрузка списка типов
        fetch('/production-records/api/couplings/types')
            .then(response => response.json())
            .then(types => {
                types.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    typeSelect.appendChild(option);
                });
                // Если есть текущий тип, устанавливаем его и загружаем диаметры
                if (currentType) {
                    typeSelect.value = currentType;
                    typeSelect.dispatchEvent(new Event('change'));
                }
            })
            .catch(error => console.error('Ошибка загрузки типов:', error));

        // При смене типа загружаем диаметры
        typeSelect.addEventListener('change', function() {
            const selectedType = this.value;
            diameterSelect.innerHTML = '<option value="">-- Выберите диаметр --</option>';
            couplingIdHidden.value = '';
            if (!selectedType) {
                diameterSelect.disabled = true;
                return;
            }
            diameterSelect.disabled = false;
            fetch(`/production-records/api/couplings/by-type?type=${encodeURIComponent(selectedType)}`)
                .then(response => response.json())
                .then(couplings => {
                    couplings.forEach(c => {
                        const option = document.createElement('option');
                        option.value = c.id;
                        option.textContent = c.diameter;
                        diameterSelect.appendChild(option);
                    });
                    // Если редактируем и есть currentCouplingId, выбираем нужный диаметр
                    if (currentCouplingId && currentDiameter) {
                        for (let i = 0; i < diameterSelect.options.length; i++) {
                            if (diameterSelect.options[i].value == currentCouplingId) {
                                diameterSelect.value = currentCouplingId;
                                couplingIdHidden.value = currentCouplingId;
                                break;
                            }
                        }
                    }
                })
                .catch(error => console.error('Ошибка загрузки диаметров:', error));
        });

        // При выборе диаметра обновляем скрытое поле
        diameterSelect.addEventListener('change', function() {
            couplingIdHidden.value = this.value;
        });
    });
    /*]]>*/
</script>
</body>
</html>
