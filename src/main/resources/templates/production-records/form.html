<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Журнал производства - ${record.id == null ? 'Новая запись' : 'Редактирование'}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1 th:if="${record.id == null}">Новая запись</h1>
    <h1 th:unless="${record.id == null}">Редактирование записи</h1>

    <form action="#" th:action="@{/production-records/save}" th:object="${record}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}" />

        <!-- Дата изготовления -->
        <div class="mb-3">
            <label for="productionDate" class="form-label">Дата изготовления <span class="text-danger">*</span></label>
            <input type="date" id="productionDate" th:field="*{productionDate}" class="form-control" required />
        </div>

        <!-- Тип изделия (радиокнопки) -->
        <input type="hidden" name="productType" id="productTypeHidden" />
        <div class="mb-3">
            <label class="form-label">Тип изделия <span class="text-danger">*</span></label>
            <div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="productTypeRadio" id="typeCoupling" value="COUPLING"
                           th:checked="${currentProductType == 'COUPLING'}">
                    <label class="form-check-label" for="typeCoupling">Муфта</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="productTypeRadio" id="typeAdapter" value="ADAPTER"
                           th:checked="${currentProductType == 'ADAPTER'}">
                    <label class="form-check-label" for="typeAdapter">Переводник</label>
                </div>
            </div>
        </div>

        <!-- Блок для муфты -->
        <div id="couplingBlock" style="display: none;">
            <div class="mb-3">
                <label class="form-label">Тип муфты <span class="text-danger">*</span></label>
                <select id="typeSelect" class="form-select">
                    <option value="">-- Выберите тип --</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Условный диаметр <span class="text-danger">*</span></label>
                <select id="diameterSelect" class="form-select" disabled>
                    <option value="">-- Сначала выберите тип --</option>
                </select>
            </div>
            <input type="hidden" th:field="*{coupling.id}" id="couplingIdHidden" />
        </div>

        <!-- Блок для переводника -->
        <div id="adapterBlock" style="display: none;">
            <div class="mb-3">
                <label class="form-label">Тип первой стороны <span class="text-danger">*</span></label>
                <select id="adapterFirstSideTypeSelect" class="form-select">
                    <option value="">-- Выберите тип --</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Переводник <span class="text-danger">*</span></label>
                <select id="adapterSelect" class="form-select" disabled>
                    <option value="">-- Сначала выберите тип --</option>
                </select>
            </div>
            <input type="hidden" th:field="*{adapter.id}" id="adapterIdHidden" />
        </div>

        <!-- Количество -->
        <div class="mb-3">
            <label for="quantity" class="form-label">Количество <span class="text-danger">*</span></label>
            <input type="number" id="quantity" th:field="*{quantity}" class="form-control" min="1" required />
        </div>

        <!-- Сотрудник -->
        <div class="mb-3">
            <label for="employee" class="form-label">Сотрудник <span class="text-danger">*</span></label>
            <select id="employee" th:field="*{employee.id}" class="form-select" required>
                <option value="">Выберите сотрудника</option>
                <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.name}"></option>
            </select>
        </div>

        <!-- Станок -->
        <div class="mb-3">
            <label for="machine" class="form-label">Станок <span class="text-danger">*</span></label>
            <select id="machine" th:field="*{machine.id}" class="form-select" required>
                <option value="">Выберите станок</option>
                <option th:each="m : ${machines}" th:value="${m.id}" th:text="${m.name}"></option>
            </select>
        </div>

        <!-- Комментарий -->
        <div class="mb-3">
            <label for="comment" class="form-label">Комментарий</label>
            <textarea id="comment" th:field="*{comment}" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Сохранить</button>
        <a th:href="@{/production-records}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        // Элементы
        const radioCoupling = document.getElementById('typeCoupling');
        const radioAdapter = document.getElementById('typeAdapter');
        const couplingBlock = document.getElementById('couplingBlock');
        const adapterBlock = document.getElementById('adapterBlock');

        // Элементы для муфты
        const typeSelect = document.getElementById('typeSelect');
        const diameterSelect = document.getElementById('diameterSelect');
        const couplingIdHidden = document.getElementById('couplingIdHidden');

        // Элементы для переводника
        const firstSideTypeSelect = document.getElementById('adapterFirstSideTypeSelect');
        const adapterSelect = document.getElementById('adapterSelect');
        const adapterIdHidden = document.getElementById('adapterIdHidden');

        // Переменные из модели (передаются контроллером)
        const currentProductType = /*[[${currentProductType}]]*/ null;
        const currentCouplingId = /*[[${currentCouplingId}]]*/ null;
        const currentCouplingType = /*[[${currentCouplingType}]]*/ null;
        const currentCouplingDiameter = /*[[${currentCouplingDiameter}]]*/ null;
        const currentAdapterId = /*[[${currentAdapterId}]]*/ null;
        const currentAdapterFirstSideType = /*[[${currentAdapterFirstSideType}]]*/ null;

        // --- Управление видимостью блоков ---
        function toggleBlocks() {
            const isCoupling = radioCoupling.checked;
            couplingBlock.style.display = isCoupling ? 'block' : 'none';
            adapterBlock.style.display = isCoupling ? 'none' : 'block';
            document.getElementById('productTypeHidden').value = isCoupling ? 'COUPLING' : 'ADAPTER';
            if (isCoupling) {
                // Если блок муфты становится видимым и ещё не загружены типы
                if (typeSelect.options.length <= 1) loadCouplingTypes();
            } else {
                // Если блок переводника становится видимым и ещё не загружены типы первой стороны
                if (firstSideTypeSelect.options.length <= 1) loadAdapterFirstSideTypes();
            }
        }

        radioCoupling.addEventListener('change', toggleBlocks);
        radioAdapter.addEventListener('change', toggleBlocks);

        // --- Логика для муфт ---
        function loadCouplingTypes() {
            fetch('/production-records/api/couplings/types')
                .then(response => response.json())
                .then(types => {
                    typeSelect.innerHTML = '<option value="">-- Выберите тип --</option>';
                    types.forEach(type => {
                        const option = document.createElement('option');
                        option.value = type;
                        option.textContent = type;
                        typeSelect.appendChild(option);
                    });
                    // Если редактируем муфту, устанавливаем тип и загружаем диаметры
                    if (currentProductType === 'COUPLING' && currentCouplingType) {
                        typeSelect.value = currentCouplingType;
                        typeSelect.dispatchEvent(new Event('change'));
                    }
                })
                .catch(error => console.error('Ошибка загрузки типов муфт:', error));
        }

        function loadCouplingDiameters(type) {
            diameterSelect.innerHTML = '<option value="">-- Выберите диаметр --</option>';
            couplingIdHidden.value = '';
            if (!type) {
                diameterSelect.disabled = true;
                return;
            }
            diameterSelect.disabled = false;
            fetch(`/production-records/api/couplings/by-type?type=${encodeURIComponent(type)}`)
                .then(response => response.json())
                .then(couplings => {
                    couplings.forEach(c => {
                        const option = document.createElement('option');
                        option.value = c.id;
                        option.textContent = c.diameter;
                        diameterSelect.appendChild(option);
                    });
                    if (currentProductType === 'COUPLING' && currentCouplingId) {
                        for (let i = 0; i < diameterSelect.options.length; i++) {
                            if (diameterSelect.options[i].value == currentCouplingId) {
                                diameterSelect.value = currentCouplingId;
                                couplingIdHidden.value = currentCouplingId;
                                break;
                            }
                        }
                    }
                })
                .catch(error => console.error('Ошибка загрузки диаметров:', error));
        }

        typeSelect.addEventListener('change', function() {
            loadCouplingDiameters(this.value);
        });
        diameterSelect.addEventListener('change', function() {
            couplingIdHidden.value = this.value;
        });

        // --- Логика для переводников ---
        function loadAdapterFirstSideTypes() {
            fetch('/production-records/api/adapters/first-side-types')
                .then(response => response.json())
                .then(types => {
                    firstSideTypeSelect.innerHTML = '<option value="">-- Выберите тип --</option>';
                    types.forEach(type => {
                        const option = document.createElement('option');
                        option.value = type;
                        option.textContent = type;
                        firstSideTypeSelect.appendChild(option);
                    });
                    if (currentProductType === 'ADAPTER' && currentAdapterFirstSideType) {
                        firstSideTypeSelect.value = currentAdapterFirstSideType;
                        firstSideTypeSelect.dispatchEvent(new Event('change'));
                    }
                })
                .catch(error => console.error('Ошибка загрузки типов первой стороны:', error));
        }

        function loadAdaptersByFirstSideType(firstSideType) {
            adapterSelect.innerHTML = '<option value="">-- Выберите переводник --</option>';
            adapterIdHidden.value = '';
            if (!firstSideType) {
                adapterSelect.disabled = true;
                return;
            }
            adapterSelect.disabled = false;
            fetch(`/production-records/api/adapters/by-first-side-type?type=${encodeURIComponent(firstSideType)}`)
                .then(response => response.json())
                .then(adapters => {
                    adapters.forEach(adapter => {
                        const option = document.createElement('option');
                        option.value = adapter.id;
                        option.textContent = adapter.fullName;
                        adapterSelect.appendChild(option);
                    });
                    if (currentProductType === 'ADAPTER' && currentAdapterId) {
                        for (let i = 0; i < adapterSelect.options.length; i++) {
                            if (adapterSelect.options[i].value == currentAdapterId) {
                                adapterSelect.value = currentAdapterId;
                                adapterIdHidden.value = currentAdapterId;
                                break;
                            }
                        }
                    }
                })
                .catch(error => console.error('Ошибка загрузки переводников:', error));
        }

        firstSideTypeSelect.addEventListener('change', function() {
            loadAdaptersByFirstSideType(this.value);
        });
        adapterSelect.addEventListener('change', function() {
            adapterIdHidden.value = this.value;
        });

        // --- Инициализация ---
        // Устанавливаем начальную видимость блоков в зависимости от currentProductType
        if (currentProductType === 'COUPLING') {
            radioCoupling.checked = true;
            radioAdapter.checked = false;
            document.getElementById('productTypeHidden').value = 'COUPLING';
        } else if (currentProductType === 'ADAPTER') {
            radioCoupling.checked = false;
            radioAdapter.checked = true;
            document.getElementById('productTypeHidden').value = 'ADAPTER';
        } else {
            // По умолчанию – муфта (или оба блока скрыты, пока пользователь не выберет)
            radioCoupling.checked = true;
            document.getElementById('productTypeHidden').value = 'COUPLING';
        }
        toggleBlocks();
    });
    /*]]>*/
</script>
</body>
</html>
