<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Журнал производства</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Журнал производства</h1>
        <a th:href="@{/production-records/new}" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Добавить запись
        </a>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <i class="bi bi-funnel"></i> Фильтры
        </div>
        <div class="card-body">
            <form method="get" class="row g-3" id="filterForm">
                <!-- Тип изделия -->
                <div class="col-md-2">
                    <label class="form-label">Тип изделия</label>
                    <select id="filterProductType" name="productType" class="form-select">
                        <option value="">Все</option>
                        <option value="COUPLING" th:selected="${selectedProductType == 'COUPLING'}">Муфта</option>
                        <option value="ADAPTER" th:selected="${selectedProductType == 'ADAPTER'}">Переводник</option>
                    </select>
                </div>

                <!-- Блок фильтров для муфты (по умолчанию виден, если выбран COUPLING или не выбран тип) -->
                <div id="filterCouplingBlock" style="display: none;">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Тип муфты</label>
                            <select id="filterTypeSelect" class="form-select">
                                <option value="">-- Все типы --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Условный диаметр</label>
                            <select id="filterDiameterSelect" class="form-select" disabled>
                                <option value="">-- Сначала выберите тип --</option>
                            </select>
                        </div>
                        <input type="hidden" name="couplingId" id="filterCouplingIdHidden" value="" />
                    </div>
                </div>

                <!-- Блок фильтров для переводника -->
                <div id="filterAdapterBlock" style="display: none;">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Переводник</label>
                            <select id="filterAdapterSelect" name="adapterId" class="form-select">
                                <option value="">-- Все переводники --</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Общие фильтры: сотрудник, станок, даты -->
                <div class="col-md-3">
                    <label for="employeeId" class="form-label">Сотрудник</label>
                    <select name="employeeId" id="employeeId" class="form-select">
                        <option value="">Все</option>
                        <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.name}"
                                th:selected="${e.id == selectedEmployeeId}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="machineId" class="form-label">Станок</label>
                    <select name="machineId" id="machineId" class="form-select">
                        <option value="">Все</option>
                        <option th:each="m : ${machines}" th:value="${m.id}" th:text="${m.name}"
                                th:selected="${m.id == selectedMachineId}"></option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="startDate" class="form-label">Дата с</label>
                    <input type="date" name="startDate" id="startDate" class="form-control"
                           th:value="${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}" />
                </div>

                <div class="col-md-2">
                    <label for="endDate" class="form-label">Дата по</label>
                    <input type="date" name="endDate" id="endDate" class="form-control"
                           th:value="${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}" />
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Применить</button>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <a href="/production-records" class="btn btn-secondary w-100">Сбросить</a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${message}" th:class="'alert alert-' + ${messageType}" role="alert">
        <span th:text="${message}">Сообщение</span>
    </div>

    <div th:if="${recordsPage.isEmpty()}" class="alert alert-info">
        Записей пока нет.
    </div>

    <table class="table table-striped table-hover" th:unless="${recordsPage.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Дата изготовления</th>
            <th>Продукция</th>
            <th>Количество</th>
            <th>Сотрудник</th>
            <th>Станок</th>
            <th>Комментарий</th>
            <th>Дата записи</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="rec : ${recordsPage.content}">
            <td th:text="${rec.id}">1</td>
            <td th:text="${#temporals.format(rec.productionDate, 'dd.MM.yyyy')}">01.01.2025</td>
            <td th:text="${rec.productName}">Муфта НКТ 73</td>
            <td th:text="${rec.quantity}">10</td>
            <td th:text="${rec.employee.name}">Иванов И.И.</td>
            <td th:text="${rec.machine.name}">Токарный станок 1</td>
            <td th:text="${rec.comment}">-</td>
            <td th:text="${#temporals.format(rec.createdAt, 'dd.MM.yyyy HH:mm')}">15.03.2025 14:30</td>
            <td>
                <a th:href="@{/production-records/edit/{id}(id=${rec.id})}" class="btn btn-sm btn-primary">
                    <i class="bi bi-pencil"></i>
                </a>
                <form th:action="@{/production-records/delete/{id}(id=${rec.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить запись?')">
                        <i class="bi bi-trash"></i>
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <nav th:if="${recordsPage.totalPages > 1}" aria-label="Навигация по страницам">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${recordsPage.first} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/production-records(
                productType=${selectedProductType},
                couplingId=${selectedCouplingId},
                adapterId=${selectedAdapterId},
                employeeId=${selectedEmployeeId},
                machineId=${selectedMachineId},
                startDate=${#temporals.format(startDate, 'yyyy-MM-dd')},
                endDate=${#temporals.format(endDate, 'yyyy-MM-dd')},
                page=${currentPage - 1},
                size=20)}">
                    <i class="bi bi-chevron-left"></i> Назад
                </a>
            </li>

            <li th:each="pageNum : ${#numbers.sequence(0, recordsPage.totalPages - 1)}"
                th:if="${pageNum >= currentPage - 2 and pageNum <= currentPage + 2}"
                class="page-item" th:classappend="${pageNum == currentPage} ? 'active' : ''">
                <a class="page-link" th:href="@{/production-records(
                productType=${selectedProductType},
                couplingId=${selectedCouplingId},
                adapterId=${selectedAdapterId},
                employeeId=${selectedEmployeeId},
                machineId=${selectedMachineId},
                startDate=${#temporals.format(startDate, 'yyyy-MM-dd')},
                endDate=${#temporals.format(endDate, 'yyyy-MM-dd')},
                page=${pageNum},
                size=20)}"
                   th:text="${pageNum + 1}">1</a>
            </li>

            <li class="page-item" th:classappend="${recordsPage.last} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/production-records(
                productType=${selectedProductType},
                couplingId=${selectedCouplingId},
                adapterId=${selectedAdapterId},
                employeeId=${selectedEmployeeId},
                machineId=${selectedMachineId},
                startDate=${#temporals.format(startDate, 'yyyy-MM-dd')},
                endDate=${#temporals.format(endDate, 'yyyy-MM-dd')},
                page=${currentPage + 1},
                size=20)}">
                    Вперёд <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
document.addEventListener('DOMContentLoaded', function() {
    const productTypeSelect = document.getElementById('filterProductType');
    const couplingBlock = document.getElementById('filterCouplingBlock');
    const adapterBlock = document.getElementById('filterAdapterBlock');
    const adapterSelect = document.getElementById('filterAdapterSelect');

    const typeSelect = document.getElementById('filterTypeSelect');
    const diameterSelect = document.getElementById('filterDiameterSelect');
    const couplingIdHidden = document.getElementById('filterCouplingIdHidden');

    const selectedCouplingId = /*[[${selectedCouplingId}]]*/ null;
    const selectedAdapterId = /*[[${selectedAdapterId}]]*/ null;

    // ----- Муфты -----
    function loadCouplingTypes() {
        fetch('/production-records/api/couplings/types')
            .then(res => res.json())
            .then(types => {
                typeSelect.innerHTML = '<option value="">-- Все типы --</option>';
                types.forEach(type => {
                    typeSelect.add(new Option(type, type));
                });
                if (selectedCouplingId) fetchCouplingDetails(selectedCouplingId);
            });
    }

    function fetchCouplingDetails(couplingId) {
        fetch(`/production-records/api/couplings/${couplingId}`)
            .then(res => res.json())
            .then(data => {
                typeSelect.value = data.type;
                typeSelect.dispatchEvent(new Event('change'));
                const wait = setInterval(() => {
                    if (diameterSelect.options.length > 1) {
                        clearInterval(wait);
                        [...diameterSelect.options].forEach(opt => {
                            if (opt.value == couplingId) {
                                diameterSelect.value = couplingId;
                                couplingIdHidden.value = couplingId;
                            }
                        });
                    }
                }, 100);
            });
    }

    typeSelect.addEventListener('change', function() {
        const type = this.value;
        diameterSelect.innerHTML = '<option value="">-- Выберите диаметр --</option>';
        couplingIdHidden.value = '';
        if (!type) {
            diameterSelect.disabled = true;
            return;
        }
        diameterSelect.disabled = false;
        fetch(`/production-records/api/couplings/by-type?type=${encodeURIComponent(type)}`)
            .then(res => res.json())
            .then(couplings => {
                couplings.forEach(c => {
                    diameterSelect.add(new Option(c.diameter, c.id));
                });
                if (selectedCouplingId) {
                    [...diameterSelect.options].forEach(opt => {
                        if (opt.value == selectedCouplingId) {
                            diameterSelect.value = selectedCouplingId;
                            couplingIdHidden.value = selectedCouplingId;
                        }
                    });
                }
            });
    });

    diameterSelect.addEventListener('change', function() {
        couplingIdHidden.value = this.value;
    });

    // ----- Переводники -----
    function loadAllAdapters() {
        fetch('/production-records/api/adapters')
            .then(res => res.json())
            .then(adapters => {
                adapterSelect.innerHTML = '<option value="">-- Все переводники --</option>';
                adapters.forEach(a => {
                    const opt = new Option(a.fullName, a.id);
                    if (a.id == selectedAdapterId) opt.selected = true;
                    adapterSelect.add(opt);
                });
            });
    }

    function toggleFilterBlocks() {
        if (productTypeSelect.value === 'ADAPTER') {
            couplingBlock.style.display = 'none';
            adapterBlock.style.display = 'block';
            if (adapterSelect.options.length <= 1) loadAllAdapters();
        } else {
            couplingBlock.style.display = 'block';
            adapterBlock.style.display = 'none';
            if (typeSelect.options.length <= 1) loadCouplingTypes();
        }
    }

    function loadAdapters() {
        fetch('/production-records/api/adapters')
            .then(response => response.json())
            .then(adapters => {
                adapterSelect.innerHTML = '<option value="">-- Все переводники --</option>';
                adapters.forEach(adapter => {
                    const option = document.createElement('option');
                    option.value = adapter.id;
                    option.textContent = adapter.fullName; // используем getFullName()
                    if (adapter.id == selectedAdapterId) option.selected = true;
                    adapterSelect.appendChild(option);
                });
            })
            .catch(error => console.error('Ошибка загрузки переводников:', error));
    }

    productTypeSelect.addEventListener('change', toggleFilterBlocks);
    toggleFilterBlocks(); // начальная установка
});
/*]]>*/
</script>
</body>
</html>
