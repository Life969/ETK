<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Справочник переводников</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center">
            <h1>Справочник переводников</h1>
            <img th:src="@{/images/bearAxe.png}" alt="Медведь с топором"
                 style="width: 65px; height: auto; margin-left: 15px;">
        </div>

        <div>
            <a href="/couplings" class="btn btn-primary me-2">
                <img src="/images/book.png" alt="Книга" style="width: 20px; height: 20px; margin-right: 6px;">
                Муфты
            </a>

            <a href="/" class="btn btn-primary">
                <img src="/images/HS.png" alt="Камень возвращения" style="width: 20px; height: 20px; margin-right: 6px;">
                На главную
            </a>
        </div>
    </div>

    <div th:if="${message}" th:class="'alert alert-' + ${messageType}" role="alert">
        <span th:text="${message}">Сообщение</span>
    </div>

    <div th:if="${groupedAdapters.isEmpty()}" class="alert alert-info" role="alert">
        <p>Список переводников пуст.</p>
    </div>

    <div class="accordion" id="adaptersAccordion">
        <div th:each="entry, iter : ${groupedAdapters}" class="accordion-item">
            <h2 class="accordion-header" th:id="'heading-' + ${iter.index}">
                <button class="accordion-button" th:classappend="${iter.index == 0} ? '' : 'collapsed'"
                        type="button" data-bs-toggle="collapse"
                        th:data-bs-target="'#collapse-' + ${iter.index}"
                        aria-expanded="true"
                        th:aria-controls="'collapse-' + ${iter.index}">
                    <strong th:text="${entry.key} + ' (' + ${#lists.size(entry.value)} + ')'"></strong>
                </button>
            </h2>
            <div th:id="'collapse-' + ${iter.index}"
                 class="accordion-collapse collapse"
                 th:classappend="${iter.index == 0} ? 'show' : ''"
                 th:aria-labelledby="'heading-' + ${iter.index}"
                 data-bs-parent="#adaptersAccordion">
                <div class="accordion-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>Переводник</th>
                            <th>Длина (мм)</th>
                            <th>Вес (кг)</th>
                            <th>Наруж. диаметр (мм)</th>
                            <th>Внутр. диаметр (мм)</th>
                            <th>Цена изготовления (руб)</th>
                            <th>Цена для работника (руб)</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="adapter : ${entry.value}"
                            th:attr="data-id=${adapter.id},
                                 data-name=${adapter.getFullName()},
                                 data-first-type=${adapter.firstSideType},
                                 data-first-diameter=${adapter.firstSideDiameter},
                                 data-second-type=${adapter.secondSideType},
                                 data-second-diameter=${adapter.secondSideDiameter},
                                 data-length=${adapter.lengthMm != null ? adapter.lengthMm : ''},
                                 data-weight=${adapter.weightKg != null ? adapter.weightKg : ''},
                                 data-outer-diameter=${adapter.outerDiameterMm != null ? adapter.outerDiameterMm : ''},
                                 data-inner-diameter=${adapter.innerDiameterMm != null ? adapter.innerDiameterMm : ''},
                                 data-cost=${adapter.manufacturingCost != null ? adapter.manufacturingCost : ''},
                                 data-price=${adapter.priceForEmployee != null ? adapter.priceForEmployee : ''},
                                 data-description=${adapter.description != null ? adapter.description : ''},
                                 data-image=${adapter.imagePath != null ? adapter.imagePath : ''}">
                            <td>
                                <a th:href="@{/pipe-adapters/{id}(id=${adapter.id})}"
                                   th:text="${adapter.firstSideType + ' ' + adapter.firstSideDiameter + ' x ' + adapter.secondSideType + ' ' + adapter.secondSideDiameter}">
                                </a>
                            </td>
                            <td th:text="${adapter.lengthMm}"></td>
                            <td th:text="${adapter.weightKg}"></td>
                            <td th:text="${adapter.outerDiameterMm}"></td>
                            <td th:text="${adapter.innerDiameterMm}"></td>
                            <td th:text="${adapter.manufacturingCost}"></td>
                            <td th:text="${adapter.priceForEmployee}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <a href="/pipe-adapters/new" class="btn btn-success mt-3">Добавить переводник</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Создаём контейнер для тултипа
    const tooltip = document.createElement('div');
    tooltip.className = 'wow-tooltip';
    tooltip.style.display = 'none';
    document.body.appendChild(tooltip);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getValue(value, defaultValue = '—') {
        if (value === undefined || value === null || value === '') return defaultValue;
        return value;
    }

    function updateTooltipContent(row) {
        // Берём данные из data-атрибутов
        const name = row.dataset.name || 'Без названия';
        const firstType = row.dataset.firstType || '';
        const firstDiam = row.dataset.firstDiameter || '';
        const secondType = row.dataset.secondType || '';
        const secondDiam = row.dataset.secondDiameter || '';
        const length = getValue(row.dataset.length);
        const weight = getValue(row.dataset.weight);
        const outerD = getValue(row.dataset.outerDiameter);
        const innerD = getValue(row.dataset.innerDiameter);
        const cost = getValue(row.dataset.cost);
        const price = getValue(row.dataset.price);
        let description = row.dataset.description || '';
        const imagePath = row.dataset.image;

        if (description.length > 200) description = description.substring(0, 200) + '...';

        // Формируем иконку (фото)
        let imageHtml = '';
        if (imagePath && imagePath !== '') {
            let imgUrl = imagePath;
            if (!imgUrl.startsWith('/') && !imgUrl.startsWith('http')) {
                imgUrl = '/uploads/adapters/' + imgUrl; // подстрой под свой путь, если нужно
            }
            imageHtml = `<div class="tooltip-image"><img src="${escapeHtml(imgUrl)}" alt="icon" onerror="this.style.display='none'"></div>`;
        } else {
            imageHtml = `<div class="tooltip-image"><i class="bi bi-cup-straw" style="font-size:24px; color:#c69b6d;"></i></div>`;
        }

        // Тип переводника: "НКТ 73 x НКТ 89"
        const typeLine = 'Переводник';

        tooltip.innerHTML = `
            <div class="tooltip-header">
                ${imageHtml}
                <div class="tooltip-title">
                    <div class="item-name quality5">${escapeHtml(name)}</div>
                    <div class="item-type">${escapeHtml(typeLine)}</div>
                </div>
            </div>
            <div class="stats">
                <div class="stat"><span>📏 Длина:</span><span class="stat-value">${length} мм</span></div>
                <div class="stat"><span>⚖️ Вес:</span><span class="stat-value">${weight} кг</span></div>
                <div class="stat"><span>🔘 Наруж. диаметр:</span><span class="stat-value">${outerD} мм</span></div>
                <div class="stat"><span>🎯 Внутр. диаметр:</span><span class="stat-value">${innerD} мм</span></div>
            </div>
            <div class="prices">
                <div class="price-row"><span>Цена изготовления:</span><span class="coin"><i class="coin-icon"></i> ${cost} руб</span></div>
                <div class="price-row"><span>Цена для работника:</span><span class="coin"><i class="coin-icon"></i> ${price} руб</span></div>
            </div>
            ${description ? `<div class="description">📜 ${escapeHtml(description)}</div>` : ''}
        `;
    }

    function positionTooltip(event) {
        const x = event.clientX + 15;
        const y = event.clientY + 15;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';

        const tooltipRect = tooltip.getBoundingClientRect();
        if (x + tooltipRect.width > window.innerWidth) {
            tooltip.style.left = (event.clientX - tooltipRect.width - 10) + 'px';
        }
        if (y + tooltipRect.height > window.innerHeight) {
            tooltip.style.top = (event.clientY - tooltipRect.height - 10) + 'px';
        }
    }

    function bindTooltips() {
        const rows = document.querySelectorAll('tr[data-id]');
        rows.forEach(row => {
            row.addEventListener('mouseenter', (event) => {
                updateTooltipContent(row);
                tooltip.style.display = 'block';
                positionTooltip(event);
            });
            row.addEventListener('mousemove', positionTooltip);
            row.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });
    }

    document.addEventListener('DOMContentLoaded', bindTooltips);
</script>
</body>
</html>
