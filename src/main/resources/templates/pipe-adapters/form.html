<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:if="${pipeAdapter.id == null}">Новый переводник</title>
    <title th:unless="${pipeAdapter.id == null}">Редактирование переводника</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <h1 th:if="${pipeAdapter.id == null}">Новый переводник</h1>
    <h1 th:unless="${pipeAdapter.id == null}">Редактирование переводника</h1>

    <form action="#" th:action="@{/pipe-adapters/save}" th:object="${pipeAdapter}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}"/>

        <!-- Первая сторона (обязательная) -->
        <div class="mb-3">
            <label for="firstSideType" class="form-label">Тип первой стороны:<span class="text-danger">*</span></label>
            <input type="text" id="firstSideType" th:field="*{firstSideType}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <div class="mb-3">
            <label for="firstSideDiameter" class="form-label">Диаметр первой стороны:<span class="text-danger">*</span></label>
            <input type="text" id="firstSideDiameter" th:field="*{firstSideDiameter}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Вторая сторона (обязательная) -->
        <div class="mb-3">
            <label for="secondSideType" class="form-label">Тип второй стороны:<span class="text-danger">*</span></label>
            <input type="text" id="secondSideType" th:field="*{secondSideType}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <div class="mb-3">
            <label for="secondSideDiameter" class="form-label">Диаметр второй стороны:<span class="text-danger">*</span></label>
            <input type="text" id="secondSideDiameter" th:field="*{secondSideDiameter}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Длина -->
        <div class="mb-3">
            <label for="lengthMm" class="form-label">Длина (мм):<span class="text-danger">*</span></label>
            <input type="number" step="0.1" id="lengthMm" th:field="*{lengthMm}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Вес -->
        <div class="mb-3">
            <label for="weightKg" class="form-label">Вес (кг):<span class="text-danger">*</span></label>
            <input type="number" step="0.01" id="weightKg" th:field="*{weightKg}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Наружный диаметр -->
        <div class="mb-3">
            <label for="outerDiameterMm" class="form-label">Наружный диаметр (мм):<span class="text-danger">*</span></label>
            <input type="number" step="0.1" id="outerDiameterMm" th:field="*{outerDiameterMm}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Внутренний диаметр -->
        <div class="mb-3">
            <label for="innerDiameterMm" class="form-label">Внутренний диаметр (мм):<span class="text-danger">*</span></label>
            <input type="number" step="0.1" id="innerDiameterMm" th:field="*{innerDiameterMm}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Цена изготовления -->
        <div class="mb-3">
            <label for="manufacturingCost" class="form-label">Цена изготовления (руб):<span class="text-danger">*</span></label>
            <input type="number" step="0.01" id="manufacturingCost" th:field="*{manufacturingCost}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Цена для работника -->
        <div class="mb-3">
            <label for="priceForEmployee" class="form-label">Цена для работника (руб):<span class="text-danger">*</span></label>
            <input type="number" step="0.01" id="priceForEmployee" th:field="*{priceForEmployee}" class="form-control" required/>
            <small class="form-text text-muted">обязательное поле</small>
        </div>

        <!-- Фото (необязательное) -->
        <div class="mb-3">
            <label for="imagePath" class="form-label">Фото (путь к файлу):</label>
            <input type="text" id="imagePath" th:field="*{imagePath}" class="form-control" placeholder="Необязательно"/>
        </div>

        <!-- Стандарт -->
        <div class="mb-3">
            <label for="standart" class="form-label">Стандарт / ГОСТ:</label>
            <input type="text" id="standart" th:field="*{standart}" class="form-control" placeholder="Необязательно"/>
        </div>

        <!-- Описание -->
        <div class="mb-3">
            <label for="description" class="form-label">Описание:</label>
            <textarea id="description" th:field="*{description}" class="form-control" rows="3" placeholder="Необязательно"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Сохранить</button>
        <a th:href="@{/pipe-adapters}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
